## каждые 5 секунд Prometheus ходит на arch_app:8080/metrics

global:
  scrape_interval: 5s
  evaluation_interval: 5s

rule_files:
  - /etc/prometheus/alert_rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: "arch_app"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["arch_app:8080"]
      
  - job_name: "keydb"
    static_configs:
      - targets: ["redis_exporter:9121"]      