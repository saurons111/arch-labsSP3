services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: arch_app
    ports:
      - "8080:8080"
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: archdb
      DB_USER: archuser
      DB_PASSWORD: archpass
      REDIS_HOST: keydb
      REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_healthy
      keydb:
        condition: service_started
      rabbitmq:
        condition: service_started


  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  postgres:
    image: postgres:16
    container_name: arch_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: archdb
      POSTGRES_USER: archuser
      POSTGRES_PASSWORD: archpass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U archuser -d archdb"]
      interval: 5s
      timeout: 5s
      retries: 10


  notification_worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: notification_worker
    command: ["python", "worker.py"]
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
    depends_on:
      rabbitmq:
        condition: service_started


  keydb:
    image: eqalpha/keydb:x86_64_v5.3.3
    container_name: keydb
    command: "keydb-server /etc/keydb/redis.conf --server-threads 2"
    ports:
      - "6379:6379"
    volumes:
      - keydb_data:/data
volumes:
  rabbitmq_data:
  keydb_data:
  postgres_data: